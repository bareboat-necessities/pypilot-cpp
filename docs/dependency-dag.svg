    <rect width="200" height="70" />
    <text x="100" y="35">pypilot-mdns</text>
  </g>
  <g class="node" transform="translate(860 290)">
    <rect width="200" height="70" />
    <text x="100" y="35">pypilot-nmea0183-connector</text>
