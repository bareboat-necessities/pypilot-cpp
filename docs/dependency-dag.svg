<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">pypilot-cpp module dependency DAG</title>
  <desc id="desc">Directed acyclic graph of pypilot-cpp module dependencies. Arrows point from consumer modules to dependency modules.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .node rect { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .root rect { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .isolated rect { fill: #fff7ed; stroke: #ea580c; stroke-dasharray: 6 4; }
      .node text { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; dominant-baseline: middle; text-anchor: middle; }
      .edge { fill: none; stroke: #4b5563; stroke-width: 1.4; marker-end: url(#arrow); opacity: 0.78; }
      .legend text { font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .legend line { stroke: #4b5563; stroke-width: 1.4; marker-end: url(#arrow); }
      .legend rect { fill: #fff7ed; stroke: #ea580c; stroke-dasharray: 6 4; rx: 6; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="980" />
  <text class="title" x="40" y="42">pypilot-cpp module dependency DAG</text>
  <text class="subtitle" x="40" y="68">Arrows point from consumer modules to dependency modules. Nodes are real module repositories only.</text>

  <g class="edge-layer">
    <path class="edge" d="M 245 470 C 310 330, 340 180, 420 145" />
    <path class="edge" d="M 245 470 C 305 565, 345 705, 420 715" />

    <path class="edge" d="M 620 145 C 720 95, 760 90, 860 100" />
    <path class="edge" d="M 620 145 C 725 128, 760 130, 860 145" />
    <path class="edge" d="M 620 145 C 725 160, 760 178, 860 190" />
    <path class="edge" d="M 620 145 C 710 210, 765 270, 860 325" />
    <path class="edge" d="M 620 145 C 710 245, 760 330, 860 370" />
    <path class="edge" d="M 620 145 C 735 255, 770 430, 860 505" />

    <path class="edge" d="M 620 280 C 720 265, 760 505, 860 505" />
    <path class="edge" d="M 620 280 C 720 280, 760 550, 860 550" />
    <path class="edge" d="M 620 280 C 710 285, 765 320, 860 325" />
    <path class="edge" d="M 620 280 C 710 305, 760 360, 860 370" />
    <path class="edge" d="M 620 280 C 725 245, 760 205, 860 190" />
    <path class="edge" d="M 620 280 C 715 340, 765 595, 860 595" />
    <path class="edge" d="M 620 280 C 720 390, 760 630, 860 640" />

    <path class="edge" d="M 620 430 C 720 450, 760 500, 860 505" />
    <path class="edge" d="M 620 430 C 720 450, 760 540, 860 550" />
    <path class="edge" d="M 620 430 C 710 390, 760 305, 420 280" />
    <path class="edge" d="M 620 430 C 720 470, 760 620, 860 640" />

    <path class="edge" d="M 620 565 C 720 540, 760 510, 860 505" />
    <path class="edge" d="M 620 565 C 720 565, 760 550, 860 550" />
    <path class="edge" d="M 620 565 C 720 590, 760 595, 860 595" />
    <path class="edge" d="M 620 565 C 720 610, 760 635, 860 640" />

    <path class="edge" d="M 620 715 C 720 680, 760 600, 860 595" />
    <path class="edge" d="M 620 715 C 720 715, 760 650, 860 640" />

    <path class="edge" d="M 620 825 C 720 760, 760 520, 860 505" />
    <path class="edge" d="M 1060 550 C 1105 565, 1130 610, 1085 640" />
    <path class="edge" d="M 1060 325 C 1120 365, 1120 470, 1060 505" />
    <path class="edge" d="M 1060 370 C 1120 390, 1120 465, 1060 505" />
    <path class="edge" d="M 1060 370 C 1110 335, 1110 220, 1060 190" />
  </g>

