  </g>

  <g class="legend" transform="translate(40 920)">
    <line x1="0" y1="0" x2="70" y2="0" />
    <text x="85" y="4">consumer to dependency</text>
    <rect x="300" y="-20" width="42" height="28" />
    <text x="355" y="4">standalone or checkout-only in current umbrella graph</text>
  </g>
</svg>
