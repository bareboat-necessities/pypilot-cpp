name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libgpiod-dev libavahi-client-dev pkg-config

      - name: Bootstrap modules from main
        run: bash scripts/bootstrap-modules.sh

      - name: Check modules
        run: bash scripts/check-submodules.sh

      - name: Build and test Linux modules
        run: bash scripts/build-linux-all.sh

      - name: Run runtime TCP integration test
        run: bash scripts/run-linux-integration-tests.sh

  arduino:
    runs-on: ubuntu-latest
    env:
      PYPILOT_ESP32_FQBN: esp32:esp32:esp32s3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap modules from main
        run: bash scripts/bootstrap-modules.sh

      - uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino cores and libraries
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli core install esp32:esp32
          arduino-cli lib install M5Unified

      - name: Compile Arduino examples
        run: bash scripts/build-arduino-all.sh
