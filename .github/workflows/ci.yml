name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libgpiod-dev libavahi-client-dev pkg-config

      - name: Bootstrap modules from main
        run: bash scripts/bootstrap-modules.sh

      - name: Check modules
        run: bash scripts/check-submodules.sh

      - name: Build and test Linux modules
        run: bash scripts/build-linux-all.sh

      - name: Run runtime TCP integration test
        run: bash scripts/run-linux-integration-tests.sh

  arduino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap modules from main
        run: bash scripts/bootstrap-modules.sh

      - uses: arduino/setup-arduino-cli@v2

      - name: Install AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile Arduino examples
        run: bash scripts/build-arduino-all.sh
